name: Deploy static content to Pages
 
on:
  # Runs every minute (minimum interval GitHub supports).
  # Note: GitHub may delay scheduled runs by several minutes under high load.
  schedule:
    - cron: "* * * * *"
 
  # Runs on every push to the default branch so you can verify the result immediately.
  push:
    branches:
      - main   # change to master or your default branch name if different
 
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
 
# contents: write  — needed to commit updated HTML back to the repo
# pages / id-token — needed to deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
 
# Allow only one concurrent deployment; never cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  fetch-update-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      # ── 2. Fetch live weather data ────────────────────────────────────────
      # curl fetches JSON from Open-Meteo; jq extracts each field.
      - name: Fetch data from Open-Meteo API
        run: |
          DATA=$(curl -fsSL "https://api.open-meteo.com/v1/forecast\?latitude=52.52&longitude=13.41\&current=temperature_2m,wind_speed_10m,weather_code,relative_humidity_2m\&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code\&timezone=auto&forecast_days=7")
 
          echo "$DATA" > /tmp/weather.json
          echo "API fetch complete."
 
      # ── 3. Inject data into index.html using element IDs ─────────────────
      # IDs are always present in the committed HTML, so this works every run.
      - name: Update HTML with live data
        run: |
          DATA=$(cat /tmp/weather.json)
 
          TEMP=$(echo "$DATA"      | jq -r '.current.temperature_2m')
          TEMP_UNIT=$(echo "$DATA" | jq -r '.current_units.temperature_2m')
          HUMIDITY=$(echo "$DATA"  | jq -r '.current.relative_humidity_2m')
          HUM_UNIT=$(echo "$DATA"  | jq -r '.current_units.relative_humidity_2m')
          WIND=$(echo "$DATA"      | jq -r '.current.wind_speed_10m')
          WIND_UNIT=$(echo "$DATA" | jq -r '.current_units.wind_speed_10m')
          WCODE=$(echo "$DATA"     | jq -r '.current.weather_code')
          FETCHED_AT=$(date -u '+%Y-%m-%d %H:%M UTC')
 
          case "$WCODE" in
            0)        COND="Clear sky" ;;
            1)        COND="Mainly clear" ;;
            2)        COND="Partly cloudy" ;;
            3)        COND="Overcast" ;;
            45|48)    COND="Fog" ;;
            51|53|55) COND="Drizzle" ;;
            61|63|65) COND="Rain" ;;
            71|73|75) COND="Snow" ;;
            80|81|82) COND="Showers" ;;
            95)       COND="Thunderstorm" ;;
            99)       COND="Thunderstorm + hail" ;;
            *)        COND="Code $WCODE" ;;
          esac
 
          # ── Replace single-line values via ID ─────────────────────────────
          sed -i "s|id=\"temp-value\" class=\"value\">[^<]*|id=\"temp-value\" class=\"value\">${TEMP} ${TEMP_UNIT}|g" index.html
          sed -i "s|id=\"humidity-value\" class=\"value\">[^<]*|id=\"humidity-value\" class=\"value\">${HUMIDITY}${HUM_UNIT}|g" index.html
          sed -i "s|id=\"wind-value\" class=\"value\">[^<]*|id=\"wind-value\" class=\"value\">${WIND} ${WIND_UNIT}|g" index.html
          sed -i "s|id=\"condition-value\"[^>]*>[^<]*|id=\"condition-value\" class=\"value\" style=\"font-size:1rem\">${COND}|g" index.html
          sed -i "s|id=\"last-updated\"[^>]*>[^<]*|id=\"last-updated\" class=\"footer\">Last updated: ${FETCHED_AT}|g" index.html
 
          # ── Build 7-day forecast rows ─────────────────────────────────────
          COUNT=$(echo "$DATA" | jq '.daily.time | length')
          ROWS=""
          for i in $(seq 0 $((COUNT - 1))); do
            D=$(echo  "$DATA" | jq -r ".daily.time[$i]")
            C=$(echo  "$DATA" | jq -r ".daily.weather_code[$i]")
            HI=$(echo "$DATA" | jq -r ".daily.temperature_2m_max[$i]")
            LO=$(echo "$DATA" | jq -r ".daily.temperature_2m_min[$i]")
            PR=$(echo "$DATA" | jq -r ".daily.precipitation_sum[$i]")
            case "$C" in
              0)        DC="Clear sky" ;;
              1)        DC="Mainly clear" ;;
              2)        DC="Partly cloudy" ;;
              3)        DC="Overcast" ;;
              45|48)    DC="Fog" ;;
              51|53|55) DC="Drizzle" ;;
              61|63|65) DC="Rain" ;;
              71|73|75) DC="Snow" ;;
              80|81|82) DC="Showers" ;;
              95)       DC="Thunderstorm" ;;
              99)       DC="Thunderstorm + hail" ;;
              *)        DC="Code $C" ;;
            esac
            ROWS="${ROWS}          <tr><td>${D}</td><td>${DC}</td><td>${HI}°C / ${LO}°C</td><td>${PR} mm</td></tr>\n"
          done
 
          # ── Replace tbody contents, keyed off id="forecast-body" ──────────
          OPEN_LINE=$(grep -n 'id="forecast-body"' index.html | cut -d: -f1)
          CLOSE_LINE=$(awk 'NR>'"$OPEN_LINE"' && /<\/tbody>/{print NR; exit}' index.html)
          {
            head -n $OPEN_LINE index.html
            printf "%b" "$ROWS"
            tail -n +$CLOSE_LINE index.html
          } > /tmp/updated.html
          mv /tmp/updated.html index.html
 
          echo "index.html updated successfully."
 
      # ── 4. Commit & push the updated HTML back to the repo ───────────────
      # [skip ci] prevents this push from re-triggering the workflow.
      - name: Commit and push updated HTML
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes detected — nothing to commit."
          else
            git commit -m "chore(data): refresh weather dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"
            git push
          fi
 
      # ── 5. Configure GitHub Pages ────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      # ── 6. Upload public/ as the Pages artifact ──────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
 
      # ── 7. Deploy to GitHub Pages ────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4