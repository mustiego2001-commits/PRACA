name: Hourly Data Refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hourly-data-refresh
  cancel-in-progress: false

jobs:
  update-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch API data and regenerate index.html
        run: |
          python - <<'PY'
          import datetime
          import html
          import json
          import urllib.request

          API_URL = (
              "https://api.open-meteo.com/v1/forecast"
              "?latitude=52.52&longitude=13.41"
              "&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code"
              "&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code"
              "&timezone=UTC&forecast_days=7"
          )

          WEATHER_CODES = {
              0: "Clear sky",
              1: "Mainly clear",
              2: "Partly cloudy",
              3: "Overcast",
              45: "Fog",
              48: "Depositing rime fog",
              51: "Light drizzle",
              53: "Moderate drizzle",
              55: "Dense drizzle",
              61: "Slight rain",
              63: "Moderate rain",
              65: "Heavy rain",
              71: "Slight snow",
              73: "Moderate snow",
              75: "Heavy snow",
              80: "Rain showers",
              81: "Rain showers",
              82: "Violent showers",
              95: "Thunderstorm",
              99: "Thunderstorm with hail",
          }

          with urllib.request.urlopen(API_URL, timeout=20) as response:
              payload = response.read().decode("utf-8")
              data = json.loads(payload)

          current = data["current"]
          current_units = data["current_units"]
          daily = data["daily"]

          updated_at = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          condition = WEATHER_CODES.get(current["weather_code"], f"Code {current['weather_code']}")

          rows = []
          for day, code, t_max, t_min, precip in zip(
              daily["time"],
              daily["weather_code"],
              daily["temperature_2m_max"],
              daily["temperature_2m_min"],
              daily["precipitation_sum"],
          ):
              day_condition = WEATHER_CODES.get(code, f"Code {code}")
              rows.append(
                  "<tr>"
                  f"<td>{html.escape(str(day))}</td>"
                  f"<td>{html.escape(day_condition)}</td>"
                  f"<td>{t_max} / {t_min} {html.escape(data['daily_units']['temperature_2m_max'])}</td>"
                  f"<td>{precip} {html.escape(data['daily_units']['precipitation_sum'])}</td>"
                  "</tr>"
              )

          page = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Weather Dashboard</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 2rem auto; max-width: 900px; line-height: 1.5; color: #1f2937; padding: 0 1rem; }}
              h1, h2 {{ margin-bottom: .5rem; }}
              .meta {{ color: #4b5563; margin-bottom: 1rem; }}
              .cards {{ display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); margin-bottom: 1.5rem; }}
              .card {{ border: 1px solid #e5e7eb; border-radius: .5rem; padding: .75rem; background: #f9fafb; }}
              .label {{ font-size: .8rem; color: #6b7280; }}
              .value {{ font-size: 1.2rem; font-weight: 700; }}
              table {{ width: 100%; border-collapse: collapse; }}
              th, td {{ border: 1px solid #e5e7eb; padding: .5rem; text-align: left; }}
              th {{ background: #f3f4f6; }}
            </style>
          </head>
          <body>
            <h1>Berlin Weather Dashboard</h1>
            <p class="meta">Last update: {updated_at}</p>

            <section>
              <h2>Current conditions</h2>
              <div class="cards">
                <div class="card"><div class="label">Temperature</div><div class="value">{current['temperature_2m']} {current_units['temperature_2m']}</div></div>
                <div class="card"><div class="label">Humidity</div><div class="value">{current['relative_humidity_2m']} {current_units['relative_humidity_2m']}</div></div>
                <div class="card"><div class="label">Wind</div><div class="value">{current['wind_speed_10m']} {current_units['wind_speed_10m']}</div></div>
                <div class="card"><div class="label">Condition</div><div class="value">{html.escape(condition)}</div></div>
              </div>
            </section>

            <section>
              <h2>7-day forecast</h2>
              <table>
                <thead>
                  <tr><th>Date</th><th>Condition</th><th>High / Low</th><th>Precipitation</th></tr>
                </thead>
                <tbody>
                  {"".join(rows)}
                </tbody>
              </table>
            </section>
          </body>
          </html>
          """

          with open("index.html", "w", encoding="utf-8", newline="\n") as file:
              file.write(page)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh weather dashboard data"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
